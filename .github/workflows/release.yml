# 推送 v* tag 时构建多平台产物并发布到 GitHub Release；
# 可选自动上传到 Snap / Google Play / Microsoft / App Store，详见 .github/doc/STORE_DEPLOY.md
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    env:
      # 在仓库 Settings → Variables 中添加 ENABLE_GOOGLE_PLAY = true 以启用 Google Play 发布
      ENABLE_GOOGLE_PLAY: ${{ vars.ENABLE_GOOGLE_PLAY || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - name: Init Signature
        run: |
          cd android
          touch key.properties
          echo storePassword='${{ secrets.STORE_PASSWORD }}' >> key.properties
          echo keyPassword='${{ secrets.KEY_PASSWORD }}' >> key.properties
          echo keyAlias='${{ secrets.KEY_ALIAS }}' >> key.properties
          echo storeFile='../key.jks' >> key.properties
          # 保存到到key.jks, base64 -i key.jks -o key.jks.base64
          echo ${{ secrets.KEY_STORE }} | base64 --decode > $GITHUB_WORKSPACE/android/key.jks
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '23'
      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.32.8
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Release APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ./build/app/outputs/flutter-apk/app-release.apk
          body_path: ./.github/doc/DownloadDescription.md
      - run: flutter build appbundle --release
      - name: Release AAB
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ./build/app/outputs/bundle/release/app-release.aab
          body_path: ./.github/doc/DownloadDescription.md
      # Google Play 自动上传（需配置 GOOGLE_PLAY_SERVICE_ACCOUNT_JSON 与 ENABLE_GOOGLE_PLAY）
      - name: Publish AAB to Google Play
        if: env.ENABLE_GOOGLE_PLAY == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.pdf_reader.pdf_reader
          releaseFiles: ./build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

  ios:
    name: iOS
    runs-on: macos-latest
    env:
      # 在仓库 Settings → Variables 中添加 ENABLE_APP_STORE = true 以启用 TestFlight/App Store 上传
      ENABLE_APP_STORE: ${{ vars.ENABLE_APP_STORE || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.32.8
      - run: flutter config --no-enable-android
      - run: flutter pub get
      # 未启用 App Store 时：构建无签名 IPA 并发布到 GitHub Release
      - name: Build iOS IPA (no-codesign)
        if: env.ENABLE_APP_STORE != 'true'
        run: flutter build ipa --release --no-codesign
      - name: Zip and Release iOS to GitHub
        if: env.ENABLE_APP_STORE != 'true' && startsWith(github.ref, 'refs/tags/')
        run: zip -r ios-release.zip ./build/ios/archive
      - name: Release iOS IPA
        if: env.ENABLE_APP_STORE != 'true' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ios-release.zip
          body_path: ./.github/doc/DownloadDescription.md
      # 启用 App Store 时：使用 Fastlane 构建签名 IPA 并上传 TestFlight（需配置签名与 API Key）
      - name: Set up Ruby and Fastlane
        if: env.ENABLE_APP_STORE == 'true'
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Install Fastlane
        if: env.ENABLE_APP_STORE == 'true'
        run: bundle install
      - name: Build and upload iOS to TestFlight
        if: env.ENABLE_APP_STORE == 'true'
        env:
          APPLE_APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_KEY_ID }}
          APPLE_APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APPLE_APP_STORE_CONNECT_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
        run: bundle exec fastlane ios release

  linux:
    name: Linux
    runs-on: ubuntu-latest
    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
      # 在仓库 Settings → Variables 中添加 ENABLE_SNAP_STORE = true 以启用 Snap Store 发布
      ENABLE_SNAP_STORE: ${{ vars.ENABLE_SNAP_STORE || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 3.32.8
      - name: Install required build tools for linux
        run: sudo apt-get update && sudo apt-get install clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev locate rpm patchelf libfuse2
      - name: Build linux release
        run: |
          flutter config --enable-linux-desktop
          flutter config --no-enable-android
          flutter pub get
          flutter build linux --release
      - run: zip -r linux-release.zip ./build/linux/x64/release/bundle
      - name: Release Linux Zip
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            linux-release.zip
          body_path: ./.github/doc/DownloadDescription.md
      - name: Install flutter_distributor
        run: |
          dart pub global activate flutter_distributor
      - name: Build deb package
        run: |
          flutter_distributor package --platform linux --targets deb
      - name: Build rpm package
        run: |
          flutter_distributor package --platform linux --targets rpm
      - name: Build AppImage package
        run: |
          wget -O appimagetool "https://github.com/AppImage/AppImageKit/releases/download/13/obsolete-appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/
          flutter_distributor package --platform linux --targets appimage
      - name: Release Linux deb rpm AppImage
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/**/**/*.deb
            dist/**/**/*.rpm
            dist/**/**/*.AppImage
          body_path: ./.github/doc/DownloadDescription.md
      # Snap Store：构建 snap 并发布到 GitHub Release；配置 SNAPCRAFT_TOKEN 后自动推送到 Snap Store
      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic
      - name: Build Snap package
        run: cd snap && snapcraft
      - name: Release Snap to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: snap/*.snap
          body_path: ./.github/doc/DownloadDescription.md
      - name: Publish to Snap Store
        if: env.ENABLE_SNAP_STORE == 'true'
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
        run: cd snap && snapcraft upload --release=stable *.snap

  macos:
    name: MacOS
    runs-on: macos-latest
    env:
      ENABLE_APP_STORE: ${{ vars.ENABLE_APP_STORE || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 3.32.8
      - run: flutter config --enable-macos-desktop
      - run: flutter config --no-enable-android
      - run: flutter pub get
      - run: flutter build macos --debug
      - run: mkdir -p build/dmg
      - run: cp -R build/macos/Build/Products/Debug/pdf_reader.app build/dmg/pdf_reader.app
      - run: ln -s /Applications  build/dmg
      - run: ls build/dmg
      - run: hdiutil create -srcfolder build/dmg -volname "PDF Reader" -format UDZO -ov -imagekey zlib-level=9 pdf_reader.dmg
      - name: Release MacOS dmg
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ./pdf_reader.dmg
          body_path: ./.github/doc/DownloadDescription.md

  windows:
    name: Windows
    runs-on: windows-latest
    env:
      # 在仓库 Settings → Variables 中添加 ENABLE_MICROSOFT_STORE = true 以启用 Microsoft Store 发布
      ENABLE_MICROSOFT_STORE: ${{ vars.ENABLE_MICROSOFT_STORE || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 3.32.8
      - run: flutter config --enable-windows-desktop
      - run: flutter config --no-enable-android
      - run: flutter pub get
      - run: flutter build windows --release
      - run: Compress-Archive -Path build\windows\x64\runner\Release -DestinationPath windows-release.zip
      - name: Release windows zip
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            windows-release.zip
          body_path: ./.github/doc/DownloadDescription.md
      - run: dart run msix:create
      - name: Get MSIX filename
        id: msix
        run: |
          $f = Get-ChildItem build\windows\x64\runner\Release\*.msix | Select-Object -First 1
          echo "name=$($f.Name)" >> $env:GITHUB_OUTPUT
      - name: Release windows msix
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/windows/x64/runner/Release/*.msix
          body_path: ./.github/doc/DownloadDescription.md
      # Microsoft Store 提交（需在 Partner Center 创建应用并配置下方 Secrets）
      - name: Configure Microsoft Store credentials
        if: env.ENABLE_MICROSOFT_STORE == 'true'
        uses: microsoft/store-submission@v1
        with:
          command: configure
          type: win32
          seller-id: ${{ secrets.MS_STORE_SELLER_ID }}
          product-id: ${{ secrets.MS_STORE_PRODUCT_ID }}
          tenant-id: ${{ secrets.MS_STORE_TENANT_ID }}
          client-id: ${{ secrets.MS_STORE_CLIENT_ID }}
          client-secret: ${{ secrets.MS_STORE_CLIENT_SECRET }}
      - name: Update Microsoft Store draft with MSIX
        if: env.ENABLE_MICROSOFT_STORE == 'true'
        uses: microsoft/store-submission@v1
        with:
          command: update
          product-update: '{"packages":[{"packageUrl":"https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.msix.outputs.name }}","languages":["en"],"architectures":["X64"]}]}'
      - name: Publish to Microsoft Store
        if: env.ENABLE_MICROSOFT_STORE == 'true'
        uses: microsoft/store-submission@v1
        with:
          command: publish
      - name: Building the installer
        run: |
          "%programfiles(x86)%\Inno Setup 6\iscc.exe" "windows-setup.iss"
        shell: cmd
      - name: Release windows setup
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            Output/PDFReader-Setup.exe
          body_path: ./.github/doc/DownloadDescription.md

  build-flutter-app:
    name: Build and compressed Flutter app
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Flutter dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libx11-dev pkg-config cmake ninja-build libblkid-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 3.32.8

      - name: Build Flutter linux version
        working-directory: ${{ github.workspace }}
        run: |
          ./build-flutter-app.sh

      - name: Upload app archive to workflow
        uses: actions/upload-artifact@v4
        with:
          name: PDFReader-Archive
          path: PDFReader-Linux-Portable.tar.gz

      - name: Release Linux PDFReader-Linux-Portable.tar.gz
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            PDFReader-Linux-Portable.tar.gz
          body_path: ./.github/doc/DownloadDescription.md

  build-flatpak:
    name: Build flatpak
    needs: build-flutter-app
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: PDFReader-Archive

      - name: Build .flatpak
        uses: bilelmoussaoui/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: PDFReader.flatpak
          manifest-path: flathub_repo/com.iotserv.PDFReader.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: false

      - name: Upload .flatpak artifact to workflow
        uses: actions/upload-artifact@v4
        with:
          name: Flatpak artifact
          path: PDFReader.flatpak

      - name: Release Linux flatpak package
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            PDFReader.flatpak
          body_path: ./.github/doc/DownloadDescription.md
